server:
  port: 8081

spring:
  application:
    name: auth-service

  # ─── Base de datos ───────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: ${DB_USER:auth_user}
    password: ${DB_PASS:auth_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway maneja el schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ─── Flyway (migraciones) ────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Redis (refresh tokens / sesiones) ──────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 2000ms

  # ─── Kafka (eventos de autenticación) ───────────────────
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

# ─── JWT ─────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:cambiar-este-secreto-en-produccion-minimo-256-bits}
  access-token-expiration-ms: 900000       # 15 minutos
  refresh-token-expiration-ms: 604800000   # 7 días

# ─── Actuator / Observabilidad ───────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ─── Logging ─────────────────────────────────────────────
logging:
  level:
    com.auth: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
